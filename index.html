<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squai</title>
    <meta name="description" content="Squai Software as a Service (SaaS) platform for building processes with AI">
    <meta name="author" content="Squai" />

    <!--
      Security headers are delivered via HTTP (not <meta>) so that
      frame-ancestors, report-uri, and other header-only directives work.
      See config/security-headers.ts — the single source of truth.
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/YGktk21auYRi2XgzqQtnZjjqIc12/social-images/social-1772750720767-Squai_logo_(1).webp">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Squai" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/YGktk21auYRi2XgzqQtnZjjqIc12/social-images/social-1772750720767-Squai_logo_(1).webp">
    <meta property="og:title" content="Squai">
    <meta name="twitter:title" content="Squai">
    <meta property="og:description" content="Squai Software as a Service (SaaS) platform for building processes with AI">
    <meta name="twitter:description" content="Squai Software as a Service (SaaS) platform for building processes with AI">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
