name: Teo CI

on:
  push:
    branches: [main]
    paths:
      - "teo/**"
  pull_request:
    paths:
      - "teo/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    defaults:
      run:
        working-directory: teo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: teo/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -p tsconfig.app.json --noEmit
      - run: npm test
      - run: npm run build:noprerender
